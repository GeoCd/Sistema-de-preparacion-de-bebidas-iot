<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dashboard</title>

    <!-- Carga de Hojas de Estilo -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/global-styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/sidebar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/menu-premium.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>
      <!-- ========================================
       TOGGLES / ICONOS DE INTERACCIÓN SUPERIOR
       ======================================== -->
    <header class ="main-header">
        <!-- Logo de la sidebar -->
        <button id="menu-toggle" class="sidebar-toggle">
            <img src="{{ url_for('static', filename='media/menu.svg') }}" alt="Toggle Menu" class="toggle-logo">
        </button>
        
    </header>

    <!-- ===========================
         SIDEBAR DEL MENÚ
    =========================== -->
    <div id="menu-sidebar" class="main-sidebar">
        <div class="brand-container">
            <img src="{{ url_for('static', filename='media/logo.svg') }}" alt="Bar Bot Logo" class="brand-logo">
        </div>

        <div class="sidebar-content">
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="{{ url_for('index') }}" class="nav-link active">
                        <img src="{{ url_for('static', filename='media/cart-icon.svg') }}" alt="Menú de Bebidas" class="nav-icon">
                        Menú de Bebidas
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('dashboard') }}" class="nav-link">
                        <img src="{{ url_for('static', filename='media/graph.svg') }}" alt="Menú de Bebidas" class="nav-icon">
                        Dashboard
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- ===========================
       CONTENIDO PRINCIPAL
    =========================== -->
    <main class="container dashboard-grid">
        <!-- Panel izquierdo -->
        <section class="left-panel">
            <div class="dashboard__section">
                <h2 class="main__title">Fila de pedidos</h2>
                <div id="fila-virtual"></div>
                <p id="fila-error" class="error-msg" style="display: none;">Error al cargar fila de pedidos.</p>
            </div>

        <section class="dashboard__section">
            <h3 class="main__title">Bebida en proceso</h3>
            <div id="pedido">
                <p class="loading-msg">Cargando...</p>
            </div>
        </section>

        <!-- Panel derecho -->
        <section class="right-panel">
            <div class="dashboard__section">
                <h2 class="main__title">Bebidas más pedidas</h2>
                <canvas id="grafica-bebidas"></canvas>
            </div>
            <div class="dashboard__section">
                <h2 class="main__title">Estado de sensores</h2>
                <div class="dashboard-status">
                    <p><strong>¿Hay vaso presente?:</strong> <span id="estado-vaso">-</span></p>
                    <p><strong>Pulsos de flujo:</strong> <span id="estado-flujo">-</span></p>
                    <p id="sensores-error" class="error-msg" style="display: none;">Error en sensores.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="footer bg-dark text-white text-center py-3">
        <div>Todos los derechos reservados. &copy; 2025 UPIITA-IPN. Equipo CPR</div>
    </footer>

    <!-- SCRIPTS -->
    <script src="{{ url_for('static', filename='js/menu.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/websocket.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</body>
</html>
